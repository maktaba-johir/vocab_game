name: vocab_game
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # লোগো জেনারেট করার জন্য নিচের প্যাকেজটি যোগ করা হয়েছে
  flutter_launcher_icons: "^0.13.1"

# লোগোর কনফিগারেশন এখানে দেওয়া হলো
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/word_data.csv
    - assets/icon/app_icon.png